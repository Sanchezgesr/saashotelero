name: Database Backup
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1 # v1.7.1
        with:
          version: latest

      - name: Dump schema
        run: supabase db dump --linked > schema_dump_$(date -u +%Y%m%d).sql
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Dump data via pg_dump
        run: |
          pg_dump "$DATABASE_URL" \
            --no-owner --no-acl \
            --file=data_dump_$(date -u +%Y%m%d).sql
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}

      - name: Verify backup integrity
        run: |
          echo "=== Verifying schema dump ==="
          LINES=$(wc -l < schema_dump_*.sql)
          SIZE=$(wc -c < schema_dump_*.sql)
          echo "Schema: ${LINES} lines, ${SIZE} bytes"
          if [ "$SIZE" -lt 1000 ]; then
            echo "ERROR: Schema dump too small (<1KB)"
            exit 1
          fi
          # Basic SQL syntax check (BEGIN/COMMIT)
          HEAD=$(head -1 schema_dump_*.sql)
          if [[ "$HEAD" != *"BEGIN"* ]] && [[ "$HEAD" != *"CREATE"* ]]; then
            echo "ERROR: Schema dump does not start with valid SQL"
            exit 1
          fi
          echo "Schema dump OK"

          echo "=== Verifying data dump ==="
          LINES=$(wc -l < data_dump_*.sql)
          SIZE=$(wc -c < data_dump_*.sql)
          echo "Data: ${LINES} lines, ${SIZE} bytes"
          if [ "$SIZE" -lt 1000 ]; then
            echo "ERROR: Data dump too small (<1KB)"
            exit 1
          fi
          echo "Data dump OK"

      - name: Upload backup artifact
        if: success()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: supabase-backup-${{ github.run_id }}
          path: |
            schema_dump_*.sql
            data_dump_*.sql
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: |
          echo "::warning::Backup failed for run ${{ github.run_id }}"
          curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.BACKUP_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"❌ Backup failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            || true
