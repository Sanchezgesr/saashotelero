name: Database Backup
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1 # v1.7.1
        with:
          version: latest

      - name: Dump schema
        run: supabase db dump --linked > schema_dump_$(date -u +%Y%m%d).sql
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Dump data via pg_dump
        run: |
          pg_dump "$DATABASE_URL" \
            --no-owner --no-acl \
            --file=data_dump_$(date -u +%Y%m%d).sql
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}

      - name: Upload backup artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: supabase-backup-${{ github.run_id }}
          path: |
            schema_dump_*.sql
            data_dump_*.sql
          retention-days: 30
